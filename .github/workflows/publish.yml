name: Publish
on:
  release:
    types: [released]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    name: Build wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - {os: macos-15,         arch: "arm64,x86_64", build: "cp3{10,11,12,13,14}-*",          dist: "macos"}
        - {os: ubuntu-24.04,     arch: auto,           build: "cp3{10,11,12,13,14}-manylinux*", dist: "manylinux-amd"}
        - {os: ubuntu-24.04,     arch: auto,           build: "cp3{10,11,12,13,14}-musllinux*", dist: "musllinux-amd"}
        - {os: ubuntu-24.04-arm, arch: auto,           build: "cp3{10,11,12,13,14}-manylinux*", dist: "manylinux-arm"}
        - {os: ubuntu-24.04-arm, arch: auto,           build: "cp3{10,11,12,13,14}-musllinux*", dist: "musllinux-arm"}
        - {os: windows-latest,   arch: AMD64,          build: "cp3{10,11,12,13,14}-*",          dist: "windows-amd"}
        - {os: windows-latest,   arch: ARM64,          build: "cp3{10,11,12,13,14}-*",          dist: "windows-arm"}
    steps:
    - uses: actions/checkout@v6
    - env:
        CIBW_ARCHS: ${{ matrix.arch }}
        CIBW_BUILD: ${{ matrix.build }}
      name: Build wheels
      uses: pypa/cibuildwheel@v3.4.0
    - name: Upload wheels 
      uses: actions/upload-artifact@v6
      with:
        name: dist-${{ matrix.dist }}
        path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.14"
    - name: Build sdist
      run: uv build --sdist
    - uses: actions/upload-artifact@v6
      with:
        name: dist-sdist
        path: dist/*.tar.gz

  upload-to-testpypi:
    name: Publish release to PyPI
    environment: testpypi
    needs: [build-wheels, build-sdist]
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v7
      with:
        merge-multiple: true
        path: dist
        pattern: dist-*
    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  upload-to-pypi:
    name: Publish release to PyPI
    environment: pypi
    needs: [build-wheels, build-sdist, upload-to-testpypi]
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v7
      with:
        merge-multiple: true
        path: dist
        pattern: dist-*
    - uses: pypa/gh-action-pypi-publish@release/v1
