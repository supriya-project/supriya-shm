name: Test

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  schedule:
  - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "${{ matrix.python-version }}"
    - name: Install supriya-shm
      run: uv sync
    - name: Format check
      run: uv run ruff format --check src/
    - name: Lint
      run: uv run ruff check src/
    - name: Type check
      run: uv run ty check src/
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14"]

  package:
    name: Build wheels
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Build wheels
      env:
        CIBW_ARCHS: ${{ matrix.arch }}
        CIBW_BUILD: ${{ matrix.build }}
      uses: pypa/cibuildwheel@v3.4.0
    strategy:
      fail-fast: false
      matrix:
        include:
        - {os: macos-15,         arch: "arm64,x86_64", build: "cp3{10,11,12,13,14}-*"}
        - {os: ubuntu-24.04,     arch: auto,           build: "cp3{10,11,12,13,14}-manylinux*"}
        - {os: ubuntu-24.04,     arch: auto,           build: "cp3{10,11,12,13,14}-musllinux*"}
        - {os: ubuntu-24.04-arm, arch: auto,           build: "cp3{10,11,12,13,14}-manylinux*"}
        - {os: ubuntu-24.04-arm, arch: auto,           build: "cp3{10,11,12,13,14}-musllinux*"}
        - {os: windows-latest,   arch: AMD64,          build: "cp3{10,11,12,13,14}-*"}
        - {os: windows-latest,   arch: ARM64,          build: "cp3{10,11,12,13,14}-*"}

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "${{ matrix.python-version }}"
    - name: Install supriya-shm
      run: uv sync
    strategy:
      matrix:
        os: [macos-15, ubuntu-latest, windows-latest]
        python-version: ["3.14"]
