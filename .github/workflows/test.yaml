name: Test

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  schedule:
  - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.14"
    - name: Install supriya-shm
      run: uv sync
    - name: Format check
      run: uv run ruff format --check src/ tests/
    - name: Lint
      run: uv run ruff check src/ tests/
    - name: Type check
      run: uv run ty check src/ tests/

  package:
    name: Build wheels
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Build wheels
      env:
        CIBW_ARCHS: ${{ matrix.arch }}
        CIBW_BUILD: ${{ matrix.build }}
      uses: pypa/cibuildwheel@v3.4.0
    strategy:
      fail-fast: false
      matrix:
        include:
        - {os: macos-15,         arch: "arm64,x86_64", build: "cp3{10,11,12,13,14}-*"}
        - {os: ubuntu-24.04,     arch: auto,           build: "cp3{10,11,12,13,14}-manylinux*"}
        - {os: ubuntu-24.04,     arch: auto,           build: "cp3{10,11,12,13,14}-musllinux*"}
        - {os: ubuntu-24.04-arm, arch: auto,           build: "cp3{10,11,12,13,14}-manylinux*"}
        - {os: ubuntu-24.04-arm, arch: auto,           build: "cp3{10,11,12,13,14}-musllinux*"}
        - {os: windows-latest,   arch: AMD64,          build: "cp3{10,11,12,13,14}-*"}
        - {os: windows-latest,   arch: ARM64,          build: "cp3{10,11,12,13,14}-*"}

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: "${{ matrix.python-version }}"
    - uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}
        restore-keys: ${{ runner.os }}
    - name: Setup audio
      uses: supriya-project/setup-audio@main
    - name: Setup SuperCollider
      uses: supriya-project/setup-supercollider@v1.1.1
    - name: Install supriya-shm
      run: uv sync
    - name: Test
      run: uv run pytest -v
    strategy:
      matrix:
        os: [macos-15, ubuntu-latest, windows-latest]
        python-version: ["3.14"]
